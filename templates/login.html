<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin-top: 10px;
            width: 200px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background: #38bdf8;
            border: none;
            color: black;
        }
    </style>
</head>

<body>

<form method="POST">
    <h2>Login</h2>
    <input name="username" placeholder="Enter username" required>
    <button type="submit">Enter</button>
</form>

</body>
</html>
